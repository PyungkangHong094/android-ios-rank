<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>앱마켓 순위 브리핑</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
<style>
  :root {
    --page: #f9f9f7; --surface: #fcfcfb; --ink: #0b0b0b; --ink-2: #52514e;
    --muted: #898781; --grid: #e1e0d9; --border: rgba(11,11,11,0.10);
    --up: #e34948; --down: #2a78d6;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --page: #0d0d0d; --surface: #1a1a19; --ink: #ffffff; --ink-2: #c3c2b7;
      --muted: #898781; --grid: #2c2c2a; --border: rgba(255,255,255,0.10);
      --up: #e66767; --down: #3987e5;
    }
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--page); color: var(--ink);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    padding: 24px 16px 64px;
  }
  .wrap { max-width: 1100px; margin: 0 auto; }
  header { display: flex; flex-wrap: wrap; align-items: baseline; gap: 12px; margin-bottom: 20px; }
  h1 { font-size: 22px; font-weight: 700; }
  .sub { color: var(--muted); font-size: 13px; }
  .filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
  select, input[type="search"], .navbtn {
    background: var(--surface); color: var(--ink); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 10px; font: inherit; font-size: 14px;
  }
  input[type="search"] { flex: 1; min-width: 160px; }
  .navbtn { cursor: pointer; }
  .navbtn:disabled { opacity: 0.35; cursor: default; }
  footer { margin-top: 32px; color: var(--muted); font-size: 12px; text-align: center; }
  footer a { color: inherit; }
  .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .tile { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
  .tile .num { font-size: 28px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .tile .lbl { color: var(--ink-2); font-size: 13px; }
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .card h2 { font-size: 15px; font-weight: 700; margin-bottom: 10px; }
  .card .fail { color: var(--muted); font-size: 13px; }
  .sec { margin-bottom: 10px; }
  .sec-title { font-size: 12px; font-weight: 600; color: var(--ink-2); margin-bottom: 4px; }
  ul.apps { list-style: none; padding: 0; }
  ul.apps li {
    display: flex; align-items: baseline; gap: 8px; padding: 3px 0;
    border-bottom: 1px solid var(--grid); font-size: 13.5px;
  }
  ul.apps li:last-child { border-bottom: 0; }
  .rank { color: var(--muted); font-variant-numeric: tabular-nums; min-width: 34px; text-align: right; }
  .name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .name a { color: inherit; text-decoration: none; }
  .name a:hover { text-decoration: underline; }
  .badge { font-size: 12px; font-weight: 600; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .badge.up { color: var(--up); }
  .badge.down { color: var(--down); }
  .badge.new { color: var(--ink-2); }
  details { margin-top: 8px; }
  summary { cursor: pointer; color: var(--muted); font-size: 13px; user-select: none; }
  table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 13px; }
  th { text-align: left; color: var(--muted); font-weight: 500; padding: 4px 6px; border-bottom: 1px solid var(--grid); }
  td { padding: 4px 6px; border-bottom: 1px solid var(--grid); }
  td.r { text-align: right; font-variant-numeric: tabular-nums; color: var(--ink-2); }
  .empty { color: var(--muted); font-size: 13px; }
  .note { color: var(--muted); font-size: 13px; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>📊 앱마켓 순위 브리핑</h1>
    <span class="sub" id="compareNote"></span>
  </header>
  <div class="filters">
    <button class="navbtn" id="prevBtn" aria-label="이전 날짜">◀</button>
    <select id="dateSel" aria-label="날짜"></select>
    <button class="navbtn" id="nextBtn" aria-label="다음 날짜">▶</button>
    <select id="storeSel" aria-label="스토어">
      <option value="">전체 스토어</option>
      <option value="apple">🍎 앱스토어</option>
      <option value="play">🤖 플레이스토어</option>
    </select>
    <select id="countrySel" aria-label="국가">
      <option value="">전체 국가</option>
      <option value="kr">🇰🇷 한국</option>
      <option value="us">🇺🇸 미국</option>
    </select>
    <input type="search" id="searchBox" placeholder="🔍 앱 이름 검색" aria-label="앱 검색">
  </div>
  <div class="tiles" id="tiles"></div>
  <div class="note" id="note"></div>
  <div class="cards" id="cards"></div>
  <footer>매일 09:00 KST 자동 수집 · <a href="https://github.com/PyungkangHong094/android-ios-rank" target="_blank" rel="noopener">GitHub</a> · 애플 공식 RSS + 플레이스토어 크롤링</footer>
</div>
<script>
const CHART_LABEL = { 'top-free': '무료', 'top-paid': '유료', 'top-grossing': '매출' };
const STORE_LABEL = { apple: '🍎 앱스토어', play: '🤖 플레이' };
const COUNTRY_LABEL = { kr: '🇰🇷', us: '🇺🇸' };
const CAT_LABEL = { all: '전체', game: '게임' };

const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const $ = (id) => document.getElementById(id);

function chartTitle(key) {
  const [store, country, chart, cat] = key.split(':');
  const parts = [STORE_LABEL[store] ?? store, COUNTRY_LABEL[country] ?? country, CHART_LABEL[chart] ?? chart];
  if (cat) parts.push(CAT_LABEL[cat] ?? cat);
  return parts.join(' ');
}

function diffChart(today, yesterday, threshold, nowTs) {
  if (!today) return null;
  const prev = new Map((yesterday ?? []).map((a) => [a.id, a.rank]));
  const hasBaseline = yesterday != null;
  const entries = today.map((app) => {
    const p = prev.get(app.id);
    const isNew = hasBaseline && p == null;
    const isFresh = isNew && app.releaseDate && (nowTs - new Date(app.releaseDate).getTime()) / 86400000 <= NEW_DAYS;
    return { ...app, prevRank: p ?? null, delta: p != null ? p - app.rank : null, isNew, isFresh };
  });
  return {
    hasBaseline,
    entries,
    newEntries: entries.filter((a) => a.isNew),
    rising: entries.filter((a) => a.delta != null && a.delta >= threshold).sort((a, b) => b.delta - a.delta),
    falling: entries.filter((a) => a.delta != null && a.delta <= -threshold).sort((a, b) => a.delta - b.delta),
  };
}

function badge(app) {
  if (app.isNew) return `<span class="badge new">${app.isFresh ? '🔥신작' : 'NEW'}</span>`;
  if (app.delta == null) return '';
  if (app.delta > 0) return `<span class="badge up">▲${app.delta}</span>`;
  if (app.delta < 0) return `<span class="badge down">▼${-app.delta}</span>`;
  return '<span class="badge new">–</span>';
}

function appLi(app) {
  const link = app.url ? `<a href="${esc(app.url)}" target="_blank" rel="noopener">${esc(app.name)}</a>` : esc(app.name);
  return `<li><span class="rank">${app.rank}위</span><span class="name">${link}</span>${badge(app)}</li>`;
}

function section(title, apps, max = 5) {
  if (!apps.length) return '';
  const more = apps.length > max ? ` <span class="empty">외 ${apps.length - max}개</span>` : '';
  return `<div class="sec"><div class="sec-title">${title} ${apps.length}개${more}</div><ul class="apps">${apps.slice(0, max).map(appLi).join('')}</ul></div>`;
}

let DATES = [], THRESHOLD = 10, NEW_DAYS = 14;

async function fetchJSON(url) {
  const res = await fetch(url, { cache: 'no-store' });
  if (!res.ok) throw new Error(`${url}: ${res.status}`);
  return res.json();
}

async function render() {
  const date = $('dateSel').value;
  const storeF = $('storeSel').value;
  const countryF = $('countrySel').value;
  const query = $('searchBox').value.trim().toLowerCase();
  const prevDate = DATES.filter((d) => d < date).pop() ?? null;
  const idx = DATES.indexOf(date);
  $('prevBtn').disabled = idx <= 0;
  $('nextBtn').disabled = idx >= DATES.length - 1;
  $('compareNote').textContent = prevDate ? `${date} · 전일(${prevDate}) 대비` : `${date} · 비교할 전일 데이터 없음`;

  const [snap, prevSnap] = await Promise.all([
    fetchJSON(`data/${date}.json`),
    prevDate ? fetchJSON(`data/${prevDate}.json`).catch(() => null) : null,
  ]);

  let totNew = 0, totUp = 0, totDown = 0;
  const cards = [];
  for (const [key, chart] of Object.entries(snap)) {
    const [store, country] = key.split(':');
    if (storeF && store !== storeF) continue;
    if (countryF && country !== countryF) continue;
    const d = diffChart(chart, prevSnap?.[key] ?? null, THRESHOLD, new Date(date).getTime() + 86400000);
    let body;
    if (d == null) {
      if (query) continue;
      body = '<div class="fail">⚠️ 이날 수집 실패</div>';
    } else if (query) {
      const matched = d.entries.filter((a) => a.name.toLowerCase().includes(query));
      totNew += d.newEntries.length; totUp += d.rising.length; totDown += d.falling.length;
      if (!matched.length) continue;
      body = `<div class="sec"><div class="sec-title">🔍 검색 결과 ${matched.length}개</div><ul class="apps">${matched.slice(0, 20).map(appLi).join('')}</ul></div>`;
    } else {
      totNew += d.newEntries.length; totUp += d.rising.length; totDown += d.falling.length;
      const secs = section('🆕 신규 진입', d.newEntries) + section('🚀 급등', d.rising) + section('📉 급락', d.falling);
      const table = `<details><summary>Top ${d.entries.length} 전체 보기</summary><table>
        <thead><tr><th style="text-align:right">순위</th><th>앱</th><th>개발사</th><th style="text-align:right">변동</th></tr></thead>
        <tbody>${d.entries.map((a) => `<tr><td class="r">${a.rank}</td><td>${a.url ? `<a href="${esc(a.url)}" target="_blank" rel="noopener" style="color:inherit">${esc(a.name)}</a>` : esc(a.name)}</td><td class="r">${esc(a.developer ?? '')}</td><td class="r">${badge(a)}</td></tr>`).join('')}</tbody>
      </table></details>`;
      body = (secs || (d.hasBaseline ? '<div class="empty">특이 변동 없음 ✨</div>' : '<div class="empty">첫 수집 — 다음 날부터 변동 감지</div>')) + table;
    }
    cards.push(`<div class="card"><h2>${chartTitle(key)}</h2>${body}</div>`);
  }

  $('tiles').innerHTML = [
    ['신규 진입', totNew], ['급등', totUp], ['급락', totDown],
  ].map(([lbl, n]) => `<div class="tile"><div class="num">${n}</div><div class="lbl">${lbl} (${THRESHOLD}계단 기준)</div></div>`).join('');
  $('note').textContent = prevSnap ? '' : '전일 스냅샷이 없어 변동 감지 없이 순위만 표시합니다.';
  $('cards').innerHTML = cards.join('') || '<div class="empty">표시할 결과가 없습니다.</div>';
}

async function init() {
  try {
    const cfg = await fetchJSON('config.json').catch(() => null);
    if (cfg?.risingThreshold) THRESHOLD = cfg.risingThreshold;
    if (cfg?.newReleaseDays) NEW_DAYS = cfg.newReleaseDays;
    DATES = (await fetchJSON('data/index.json')).sort();
    $('dateSel').innerHTML = [...DATES].reverse().map((d) => `<option value="${d}">${d}</option>`).join('');
    $('dateSel').value = DATES[DATES.length - 1];
    for (const id of ['dateSel', 'storeSel', 'countrySel']) $(id).addEventListener('change', render);
    let t;
    $('searchBox').addEventListener('input', () => { clearTimeout(t); t = setTimeout(render, 200); });
    const step = (dir) => {
      const i = DATES.indexOf($('dateSel').value) + dir;
      if (i >= 0 && i < DATES.length) { $('dateSel').value = DATES[i]; render(); }
    };
    $('prevBtn').addEventListener('click', () => step(-1));
    $('nextBtn').addEventListener('click', () => step(1));
    await render();
  } catch (e) {
    $('note').textContent = `데이터 로드 실패: ${e.message}`;
  }
}
init();
</script>
</body>
</html>
